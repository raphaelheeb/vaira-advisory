<!doctype html>
<html class="no-js" lang="{{ page.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.title }}">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Inter+Tight:wght@500;600;700&display=swap" rel="stylesheet">

 <link rel="stylesheet" href="{{ 'vaira-advisory/assets/css/styles.css' | relative_url }}">
  <link rel="icon" href="{{ site.baseurl }}/favicon.ico">
  <link rel="alternate" hreflang="en" href="{{ site.url }}{{ site.baseurl }}{{ page.url | remove_first: '/de' }}">
  <link rel="alternate" hreflang="de" href="{{ site.url }}{{ site.baseurl }}/de{{ page.url | remove_first: '/de' }}">
</head>

<body class="{{ page.bodyClass }}">

  <!-- Remove no-js class if JS is enabled -->
  <script>
    document.documentElement.classList.remove('no-js');
  </script>

  {% include header.html %}
  {{ content }}
  {% include footer.html %}

  <!-- Email reconstruction script -->
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const emails = document.querySelectorAll(".protected-email");
      emails.forEach(el => {
        const user = el.getAttribute("data-user");
        const domain = el.getAttribute("data-domain");
        const email = `${user}@${domain}`;
        el.innerHTML = `<a href="mailto:${email}">${email}</a>`;
      });
    });
  </script>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const trigger = document.getElementById("reveal-address");
  const target = document.getElementById("vaira-address");

  if (trigger && target) {
    trigger.addEventListener("click", function() {
      const addressLines = [
        "Hegianwandweg 106",
        "8045 Zürich",
        "Schweiz"
      ];

      const noiseChars = ["\u200B", "\u200C", "\u200D", "\u2060"];

      const obfuscated = addressLines.map(line => {
        const chars = line.split("");

        // DOM-Reihenfolge zufällig mischen
        const shuffled = chars
          .map((c, i) => ({ c, i }))
          .sort(() => Math.random() - 0.5);

        // Visuelle Reihenfolge über CSS wiederherstellen
        return shuffled.map(({ c, i }) => {
          const noise = noiseChars[Math.floor(Math.random() * noiseChars.length)];
          return `<span class="addr-char" style="order:${i}" data-noise="${noise}">${c}</span>`;
        }).join("");
      }).join("<br>");

      target.innerHTML = obfuscated;
      target.style.display = "inline";
      trigger.style.display = "none";
    });
  }
});
</script>

</body>
</html>
