---
<!doctype html>
<html class="no-js" lang="{{ page.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.title }}">
  <meta name="robots" content="index, follow">

  <!-- Canonical -->
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <!-- Hreflang -->
  <link rel="alternate" hreflang="en" href="{{ site.url }}{{ site.baseurl }}{{ page.url | remove_first: '/de' }}">
  <link rel="alternate" hreflang="de" href="{{ site.url }}{{ site.baseurl }}/de{{ page.url | remove_first: '/de' }}">
  <link rel="alternate" hreflang="x-default" href="{{ site.url }}{{ site.baseurl }}{{ page.url | remove_first: '/de' }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Inter+Tight:wght@500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/styles.css?v=3005' | relative_url }}">
  <link rel="icon" href="{{ site.baseurl }}/favicon.ico">

<!-- Open Graph -->
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.title }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:type" content="website">

{% if page.lang == "de" %}
  <meta property="og:image" content="{{ site.url }}/assets/img/social-preview-de.png">
{% else %}
  <meta property="og:image" content="{{ site.url }}/assets/img/social-preview.png">
{% endif %}

<!-- Optional locale improvement -->
{% if page.lang == "de" %}
  <meta property="og:locale" content="de_CH">
{% else %}
  <meta property="og:locale" content="en_US">
{% endif %}

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title | default: site.title }}">
<meta name="twitter:description" content="{{ page.description | default: site.title }}">

{% if page.lang == "de" %}
  <meta name="twitter:image" content="{{ site.url }}/assets/img/social-preview-de.png">
{% else %}
  <meta name="twitter:image" content="{{ site.url }}/assets/img/social-preview.png">
{% endif %}

  <!-- Microsoft Clarity -->
<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "vuhgyfya54");
</script>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ProfessionalService",
  "name": "VAIRA Technology",
  "url": "{{ site.url }}",
  "logo": "{{ site.url }}/assets/img/logo.png",
  "image": [
    "{{ site.url }}/assets/img/social-preview.png",
    "{{ site.url }}/assets/img/social-preview-de.png"
  ],
  "description": "{{ page.description | default: site.description }}",
  "founder": {
    "@type": "Person",
    "name": "Raphael"
  },
  "address": {
    "@type": "PostalAddress",
    "addressCountry": "CH"
  },
  "areaServed": [
    "CH",
    "DE",
    "AT",
    "EU"
  ],
  "knowsLanguage": [
    "en",
    "de"
  ],
  "sameAs": [
    "https://vaira.ch"
  ],
  "hasOfferCatalog": {
    "@type": "OfferCatalog",
    "name": "Consulting Services",
    "itemListElement": [
      {
        "@type": "Offer",
        "itemOffered": {
          "@type": "Service",
          "name": "Deep‑Tech Consulting"
        }
      },
      {
        "@type": "Offer",
        "itemOffered": {
          "@type": "Service",
          "name": "Advanced Manufacturing Consulting"
        }
      },
      {
        "@type": "Offer",
        "itemOffered": {
          "@type": "Service",
          "name": "Automation & Industrialization"
        }
      }
    ]
  },
  "inLanguage": "{% if page.lang == 'de' %}de{% else %}en{% endif %}"
}
</script>
  
</head>

<body class="{{ page.bodyClass }}">

  <script>
    document.documentElement.classList.remove('no-js');
  </script>

  {% include header.html %}

  {{ content }}

  {% include footer.html %}

  <!-- Email reconstruction script -->
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const emails = document.querySelectorAll(".protected-email");
      emails.forEach(el => {
        const user = el.getAttribute("data-user");
        const domain = el.getAttribute("data-domain");
        const email = `${user}@${domain}`;
        el.innerHTML = `<a href="mailto:${email}">${email}</a>`;
      });
    });
  </script>

  <!-- Address obfuscation script -->
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const trigger = document.getElementById("reveal-address");
      const target = document.getElementById("vaira-address");

      if (trigger && target) {
        trigger.addEventListener("click", function() {
          const addressLines = [
            "Hegianwandweg 106",
            "8045 Zürich",
            "Schweiz"
          ];

          const noiseChars = ["\u200B", "\u200C", "\u200D", "\u2060"];

          const obfuscated = addressLines.map(line => {
            const chars = line.split("");
            const shuffled = chars
              .map((c, i) => ({ c, i }))
              .sort(() => Math.random() - 0.5);

            return shuffled.map(({ c, i }) => {
              const noise = noiseChars[Math.floor(Math.random() * noiseChars.length)];
              return `<span class="addr-char" style="order:${i}" data-noise="${noise}">${c}</span>`;
            }).join("");
          }).join("<br>");

          target.innerHTML = obfuscated;
          target.style.display = "inline";
          trigger.style.display = "none";
        });
      }
    });
  </script>

</body>
</html>
