title: VAIRA Technology
url: "https://vaira.ch"
baseurl: ""
markdown: kramdown
theme: null

# Wichtig: gesamter assets-Ordner whitelisten
include:
  - assets

# GitHub Pages metadata
repository: raphaelheeb/vaira-advisory

# Collections
collections:
  insights:
    output: true
    permalink: /insights/:name/
  de_insights:
    output: true
    permalink: /de/insights/:name/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-redirect-from
  - jekyll-include-cache

# Verhindert Minima-Autoload
github:
  theme: null

