{% assign icon = include.category | downcase %}

<div class="insight-category-icon">
  {% case icon %}

    {% when "founder narrative" %}
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <line x1="24" y1="46" x2="32" y2="20"
              stroke="#5F8A8E" stroke-width="2.25" stroke-linecap="round"/>
        <line x1="40" y1="46" x2="32" y2="20"
              stroke="#5F8A8E" stroke-width="2.25" stroke-linecap="round"/>
        <line x1="22" y1="18" x2="42" y2="18"
              stroke="#5F8A8E" stroke-width="2.25" stroke-linecap="round"/>
      </svg>

    {% when "engineering" %}
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <line x1="32" y1="18" x2="32" y2="46"
              stroke="#5F8A8E" stroke-width="2.25" stroke-linecap="round"/>
        <line x1="18" y1="32" x2="46" y2="32"
              stroke="#5F8A8E" stroke-width="2.25" stroke-linecap="round"/>
        <rect x="28" y="28" width="8" height="8"
              fill="#C9DCDC" fill-opacity="0.38"
              stroke="#5F8A8E" stroke-width="2.25"/>
      </svg>

    {% when "innovation" %}
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <!-- Loop etwas höher und tiefer gezogen, um den vollen Bereich zu nutzen -->
        <path d="M24 28 C24 24, 28 22, 32 22 C36 22, 40 24, 40 28 C40 32, 36 34, 32 34 C30 34, 28.5 33.5, 27 32.5"
              stroke="#5F8A8E" stroke-width="2.25"
              stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Pfeil nach unten bis fast zur gleichen Tiefe wie Founder Narrative -->
        <polyline points="26,40 32,34 32,46"
                  stroke="#5F8A8E" stroke-width="2.25"
                  stroke-linecap="round" stroke-linejoin="round"/>
      </svg>

    {% when "leadership" %}
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <rect x="26" y="18" width="12" height="28"
              fill="#C9DCDC" fill-opacity="0.18"/>
        <line x1="32" y1="14" x2="32" y2="50"
              stroke="#5F8A8E" stroke-width="2.25" stroke-linecap="round"/>
        <line x1="20" y1="26" x2="44" y2="26"
              stroke="#5F8A8E" stroke-width="2.25" stroke-linecap="round"/>
        <line x1="20" y1="38" x2="44" y2="38"
              stroke="#5F8A8E" stroke-width="2.25" stroke-linecap="round"/>
      </svg>

    {% when "operations" %}
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <rect x="16" y="22" width="32" height="20" rx="4"
              fill="#C9DCDC" fill-opacity="0.18"/>
        <rect x="18" y="24" width="10" height="16" rx="2"
              stroke="#5F8A8E" stroke-width="2.25" fill="none"/>
        <rect x="28" y="24" width="10" height="16" rx="2"
              stroke="#5F8A8E" stroke-width="2.25" fill="none"/>
        <rect x="38" y="24" width="10" height="16" rx="2"
              fill="#C9DCDC" fill-opacity="0.38"
              stroke="#5F8A8E" stroke-width="2.25"/>
        <path d="M18 42 H46"
              stroke="#5F8A8E" stroke-width="2.25" stroke-linecap="round"/>
      </svg>

    {% when "strategy" %}
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <rect x="30" y="22" width="12" height="10"
              fill="#C9DCDC" fill-opacity="0.28"/>
        <rect x="18" y="22" width="10" height="10"
              stroke="#5F8A8E" stroke-width="2.25" fill="none"/>
        <rect x="18" y="34" width="10" height="10"
              stroke="#5F8A8E" stroke-width="2.25" fill="none"/>
        <rect x="30" y="34" width="12" height="10"
              stroke="#5F8A8E" stroke-width="2.25" fill="none"/>
      </svg>

  {% endcase %}
</div>
