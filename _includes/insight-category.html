{% assign cat = include.category | downcase %}

<div class="insight-category-icon">
  {% case cat %}

    {% when "founder narrative" %}
      <svg fill="none" viewBox="0 0 64 64"><path stroke="currentColor" stroke-linecap="round" stroke-width="2.25" d="m24 46 8-26m8 26-8-26m-10-2h20"/></svg>

    {% when "strategy" %}
      <svg fill="none" viewBox="0 0 64 64"><path fill="#c9dcdc" fill-opacity=".28" d="M30 22h12v10H30z"/><path stroke="currentColor" stroke-width="2.25" d="M18 22h10v10H18zm0 12h10v10H18zm12 0h12v10H30z"/><path stroke="currentColor" stroke-linecap="round" stroke-width="2.25" d="M16 20h30"/></svg>

    {% when "engineering" %}
      <svg fill="none" viewBox="0 0 64 64"><circle cx="32" cy="32" r="14" fill="#c9dcdc" fill-opacity=".18"/><path stroke="currentColor" stroke-linecap="round" stroke-width="2.25" d="M32 18v28M18 32h28"/><path fill="#c9dcdc" fill-opacity=".38" stroke="currentColor" stroke-width="2.25" d="M28 28h8v8h-8z"/></svg>

    {% when "innovation" %}
      <svg fill="none" viewBox="0 0 64 64"><circle cx="32" cy="32" r="16" fill="#c9dcdc" fill-opacity=".18"/><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.25" d="M24 30c0-4 4-6 8-6s8 2 8 6-4 6-8 6c-2 0-3.5-.5-5-1.5M26 40l6-4v8"/></svg>

    {% when "operations" %}
      <svg fill="none" viewBox="0 0 64 64"><rect width="32" height="20" x="16" y="22" fill="#c9dcdc" fill-opacity=".18" rx="4"/><rect width="10" height="16" x="18" y="24" stroke="currentColor" stroke-width="2.25" rx="2"/><rect width="10" height="16" x="28" y="24" stroke="currentColor" stroke-width="2.25" rx="2"/><rect width="10" height="16" x="38" y="24" fill="#c9dcdc" fill-opacity=".38" stroke="currentColor" stroke-width="2.25" rx="2"/><path stroke="currentColor" stroke-linecap="round" stroke-width="2.25" d="M18 42h28"/></svg>

    {% when "leadership" %}
      <svg fill="none" viewBox="0 0 64 64"><path fill="#c9dcdc" fill-opacity=".18" d="M26 18h12v28H26z"/><path stroke="currentColor" stroke-linecap="round" stroke-width="2.25" d="M32 14v36M20 26h24M20 38h24"/></svg>

    {% when "innovation architecture" %}
      <svg fill="none" viewBox="0 0 64 64">
      <!-- Symmetrisches Kreuz, perfekt zentriert -->
      <path
        stroke="currentColor"
        stroke-linecap="round"
        stroke-width="2.25"
        d="M32 18v28M18 32h28"
      />
      <!-- Zentraler Knoten -->
      <circle
        cx="32"
        cy="32"
        r="4"
        fill="#c9dcdc"
        fill-opacity=".38"
        stroke="currentColor"
        stroke-width="2.25"
      />
    </svg>

  {% endcase %}
</div>
