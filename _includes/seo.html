{% comment %}
===========================================
SEO + OG METADATA (GLOBAL)
===========================================
{% endcomment %}

<title>{{ page.seo_title | default: page.title }}</title>

<meta name="description" content="{{ page.meta_description | default: page.description }}">

<link rel="canonical" href="{{ page.canonical_url | default: page.url | absolute_url }}">

<!-- Open Graph -->
<meta property="og:title" content="{{ page.og_title | default: page.title }}">
<meta property="og:description" content="{{ page.og_description | default: page.description }}">
<meta property="og:image" content="{{ page.og_image | default: page.image | absolute_url }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:type" content="article">

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.og_title | default: page.title }}">
<meta name="twitter:description" content="{{ page.og_description | default: page.description }}">
<meta name="twitter:image" content="{{ page.og_image | default: page.image | absolute_url }}">
