<svg width="520" height="260" viewBox="0 0 520 260" xmlns="http://www.w3.org/2000/svg">
  <!-- Hintergrund -->
  <rect x="0" y="0" width="520" height="260" fill="white"/>

  <!-- Achsen -->
  <line x1="60" y1="220" x2="500" y2="220" stroke="#000" stroke-width="1.2"/>
  <line x1="60" y1="30" x2="60" y2="220" stroke="#000" stroke-width="1.2"/>

  <!-- Achsenpfeile -->
  <polygon points="500,220 494,216 494,224" fill="#000"/>
  <polygon points="60,30 56,36 64,36" fill="#000"/>

  <!-- Achsen-Beschriftung -->
  <text x="18" y="30" font-size="11" font-family="system-ui, -apple-system, sans-serif" fill="#000">
    Leistung / Nutzen
  </text>
  <text x="380" y="245" font-size="11" font-family="system-ui, -apple-system, sans-serif" fill="#000">
    Zeit
  </text>

  <!-- Erste S-Kurve (bestehende Technologie) -->
  <path d="M 60 210
           C 120 210 160 185 200 155
           C 240 125 280 105 330 95
           C 370 88 410 92 450 100"
        fill="none" stroke="#000" stroke-width="2"/>

  <!-- Zweite S-Kurve (neue Technologie) – höherer Endpunkt -->
  <path d="M 160 210
           C 210 210 250 185 290 150
           C 330 115 370 90 420 80
           C 455 74 485 78 505 82"
        fill="none" stroke="#000" stroke-width="2" stroke-dasharray="5 4"/>

  <!-- Hilfslinien -->
  <line x1="60" y1="180" x2="500" y2="180" stroke="#ccc" stroke-width="0.8" stroke-dasharray="3 3"/>
  <line x1="60" y1="140" x2="500" y2="140" stroke="#ccc" stroke-width="0.8" stroke-dasharray="3 3"/>
  <line x1="60" y1="100" x2="500" y2="100" stroke="#ccc" stroke-width="0.8" stroke-dasharray="3 3"/>

  <!-- Phasen-Beschriftung -->
  <text x="80" y="235" font-size="10" font-family="system-ui, -apple-system, sans-serif" fill="#000">
    Einführung
  </text>
  <text x="190" y="235" font-size="10" font-family="system-ui, -apple-system, sans-serif" fill="#000">
    Wachstum
  </text>
  <text x="310" y="235" font-size="10" font-family="system-ui, -apple-system, sans-serif" fill="#000">
    Reife / Sättigung
  </text>

  <!-- Beschriftung bestehende Technologie -->
  <text x="240" y="110" font-size="11" font-family="system-ui, -apple-system, sans-serif" fill="#000">
    Technologie / Produkt 1
  </text>

  <!-- Beschriftung neue Technologie -->
  <text x="330" y="70" font-size="11" font-family="system-ui, -apple-system, sans-serif" fill="#000">
    Technologie / Produkt 2
  </text>

  <!-- Markierung Übergangspunkt -->
  <circle cx="330" cy="95" r="4" fill="#000"/>
  <text x="340" y="90" font-size="10" font-family="system-ui, -apple-system, sans-serif" fill="#000">
    Optimaler Wechselpunkt
  </text>

  <!-- Titel -->
  <text x="130" y="18" font-size="12" font-family="system-ui, -apple-system, sans-serif" fill="#000">
    S-Kurven-Konzept: Substitution einer bestehenden Technologie
  </text>
</svg>
