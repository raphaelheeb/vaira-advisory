<svg width="560" height="300" viewBox="0 0 560 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Farben (VAIRA-inspiriert) -->
  <!-- Dunkelblau: #0A2540 / Rot: #E4572E / Grau: #A0A7B1 -->

  <!-- Hintergrund -->
  <rect x="0" y="0" width="560" height="300" fill="white"/>

  <!-- Achsen -->
  <line x1="70" y1="250" x2="520" y2="250" stroke="#0A2540" stroke-width="1.4"/>
  <line x1="70" y1="40" x2="70" y2="250" stroke="#0A2540" stroke-width="1.4"/>

  <!-- Achsenpfeile -->
  <polygon points="520,250 514,246 514,254" fill="#0A2540"/>
  <polygon points="70,40 66,46 74,46" fill="#0A2540"/>

  <!-- Achsen-Beschriftung -->
  <text x="20" y="40" font-size="12" font-family="system-ui, -apple-system, sans-serif" fill="#0A2540">
    Leistung / Nutzen
  </text>
  <text x="400" y="275" font-size="12" font-family="system-ui, -apple-system, sans-serif" fill="#0A2540">
    Zeit
  </text>

  <!-- Alte S-Kurve (bestehende Technologie) -->
  <path d="M 70 240
           C 150 240 200 210 240 175
           C 280 140 320 120 360 115
           C 400 110 430 120 455 135"
        fill="none" stroke="#0A2540" stroke-width="2.4"/>

  <!-- Neue S-Kurve (höher, überholt alte Kurve) -->
  <path d="M 160 240
           C 220 240 260 205 300 165
           C 340 125 380 95 430 80
           C 470 70 500 75 520 82"
        fill="none" stroke="#E4572E" stroke-width="2.4" stroke-dasharray="6 4"/>

  <!-- Hilfslinien -->
  <line x1="70" y1="200" x2="520" y2="200" stroke="#A0A7B1" stroke-width="0.8" stroke-dasharray="3 3"/>
  <line x1="70" y1="160" x2="520" y2="160" stroke="#A0A7B1" stroke-width="0.8" stroke-dasharray="3 3"/>
  <line x1="70" y1="120" x2="520" y2="120" stroke="#A0A7B1" stroke-width="0.8" stroke-dasharray="3 3"/>

  <!-- Beschriftung bestehende Technologie (weiter links & unten) -->
  <text x="120" y="155" font-size="12" font-family="system-ui, -apple-system, sans-serif" fill="#0A2540">
    Bestehende Technologie / Produkt 1
  </text>

  <!-- Beschriftung neue Technologie -->
  <text x="330" y="70" font-size="12" font-family="system-ui, -apple-system, sans-serif" fill="#E4572E">
    Neue Technologie / Produkt 2
  </text>

  <!-- Schnittpunkt markieren -->
  <circle cx="360" cy="115" r="5" fill="#E4572E"/>

  <!-- Beschriftung Wechselpunkt (tiefer gesetzt) -->
  <text x="300" y="145" font-size="11" font-family="system-ui, -apple-system, sans-serif" fill="#0A2540">
    Optimaler Wechselpunkt
  </text>

  <!-- Titel -->
  <text x="110" y="25" font-size="14" font-family="system-ui, -apple-system, sans-serif" fill="#0A2540">
    S-Kurven-Konzept: Substitution einer bestehenden Technologie
  </text>
</svg>
