<svg width="560" height="300" viewBox="0 0 560 300" xmlns="http://www.w3.org/2000/svg">

  <!-- Hintergrund -->
  <rect x="0" y="0" width="560" height="300" fill="white"/>

  <!-- Achsen -->
  <line x1="70" y1="250" x2="520" y2="250" stroke="#2B4E5A" stroke-width="1.4"/>
  <line x1="70" y1="40" x2="70" y2="250" stroke="#2B4E5A" stroke-width="1.4"/>

  <!-- Achsenpfeile -->
  <polygon points="520,250 514,246 514,254" fill="#2B4E5A"/>
  <polygon points="70,40 66,46 74,46" fill="#2B4E5A"/>

  <!-- Achsen-Beschriftung -->
  <text x="18" y="28" font-size="12" font-family="system-ui, -apple-system, sans-serif" fill="#0E1514">
    Leistung / Nutzen
  </text>
  <text x="485" y="245" font-size="12" font-family="system-ui, -apple-system, sans-serif" fill="#0E1514">
    Zeit
  </text>

  <!-- Definition einer perfekt ausbalancierten S-Kurve -->
  <!-- Start flach → steil → Plateau -->
  <!-- Diese Kurve wird zweimal verwendet, einmal verschoben -->

  <!-- Alte S-Kurve (Original) -->
  <path d="M 70 240
           C 130 240 170 200 210 150
           C 250 100 310 80 360 85
           C 400 90 430 120 455 150"
        fill="none" stroke="#2B4E5A" stroke-width="2.6"/>

  <!-- Neue S-Kurve (identisch, nur verschoben + höher) -->
  <path d="M 140 220
           C 200 220 240 180 280 130
           C 320 80 380 60 430 65
           C 470 70 500 100 525 130"
        fill="none" stroke="#E4572E" stroke-width="2.6" stroke-dasharray="6 4"/>

  <!-- Hilfslinien -->
  <line x1="70" y1="200" x2="520" y2="200" stroke="rgba(0,0,0,0.08)" stroke-width="0.8" stroke-dasharray="3 3"/>
  <line x1="70" y1="160" x2="520" y2="160" stroke="rgba(0,0,0,0.08)" stroke-width="0.8" stroke-dasharray="3 3"/>
  <line x1="70" y1="120" x2="520" y2="120" stroke="rgba(0,0,0,0.08)" stroke-width="0.8" stroke-dasharray="3 3"/>

  <!-- Beschriftung bestehende Technologie -->
  <text x="150" y="175" font-size="12" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif" fill="#0E1514">
    <tspan x="150" dy="0">Bestehende Technologie</tspan>
    <tspan x="150" dy="14">(Produkt 1)</tspan>
  </text>

  <!-- Beschriftung neue Technologie -->
  <text x="430" y="45" font-size="12" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif" fill="#E4572E">
    <tspan x="430" dy="0">Neue Technologie</tspan>
    <tspan x="430" dy="14">(Produkt 2)</tspan>
  </text>

  <!-- Optimaler Wechselpunkt -->
  <circle cx="280" cy="130" r="5" fill="#E4572E"/>

  <text x="280" y="155" font-size="11" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif" fill="#0E1514">
    Optimaler Wechselpunkt
  </text>

  <!-- Titel -->
  <text x="110" y="25" font-size="14" font-family="system-ui, -apple-system, sans-serif" fill="#0E1514">
    S-Kurven-Konzept: Substitution einer bestehenden Technologie
  </text>

</svg>
