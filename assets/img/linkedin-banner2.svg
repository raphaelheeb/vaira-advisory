<svg width="1584" height="396" viewBox="0 0 1584 396"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="heroFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.24"/>
      <stop offset="20%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="topRight">
      <rect x="210" y="0" width="210" height="210"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="#2B4E5A"/>
  <rect width="1584" height="396" fill="url(#heroFade)" opacity="0.24"/>

  <!-- Top-right arc motif -->
  <g fill="none" stroke="white" stroke-linecap="round">

    <path d="M 1504.75 134.2 A 155 155 0 0 1 1429 0"
          stroke-width="1.35" stroke-opacity="0.55"/>

    <path d="M 1502.7 81.3 A 115 115 0 0 1 1469 0"
          stroke-width="1.0" stroke-opacity="0.40"/>

    <line x1="1584" y1="0" x2="1488.4" y2="94.2"
          stroke-width="1.0" stroke-opacity="0.50"/>

    <line x1="1517.6" y1="60.8" x2="1523.2" y2="66.4"
          stroke-width="0.8" stroke-opacity="0.42"/>

    <line x1="1545.1" y1="24.7" x2="1559.3" y2="38.9"
          stroke-width="0.9" stroke-opacity="0.50"/>
  </g>

  <!-- Two-line tagline (Option B) -->
  <g font-family="Public Sans, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
     font-weight="400" font-size="38" fill="#FFFFFF" letter-spacing="0.8">

    <text x="420" y="180">
      From Early Concept
      <tspan x="420" dy="48">to Industrial Scale</tspan>
    </text>

  </g>

</svg>
