<svg width="1584" height="396" viewBox="0 0 1584 396"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="heroFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.24"/>
      <stop offset="20%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="topRight">
      <rect x="210" y="0" width="210" height="210"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="#2B4E5A"/>
  <rect width="1584" height="396" fill="url(#heroFade)" opacity="0.24"/>

<!-- Top-right arc motif (corrected placement + downward radial line) -->
<g transform="translate(1338,0) scale(0.943)">
  
  <!-- Circles (same rotation as subpages) -->
  <g transform="rotate(-120 210 210)">
    <path d="M20 210 A190 190 0 0 1 400 210"
          stroke="white" stroke-width="1.75" stroke-opacity="0.55"
          vector-effect="non-scaling-stroke"/>
    <path d="M60 210 A150 150 0 0 1 360 210"
          stroke="white" stroke-width="1.25" stroke-opacity="0.40"
          vector-effect="non-scaling-stroke"/>
  </g>

  <!-- Radial line + ticks (rotated further downward) -->
  <g transform="rotate(-150 210 210)">
    <line x1="210" y1="210" x2="400" y2="210"
          stroke="white" stroke-width="1" stroke-opacity="0.45"
          vector-effect="non-scaling-stroke"/>
    <line x1="360" y1="205" x2="360" y2="215"
          stroke="white" stroke-width="1" stroke-opacity="0.40"
          vector-effect="non-scaling-stroke"/>
    <line x1="320" y1="205" x2="320" y2="215"
          stroke="white" stroke-width="1" stroke-opacity="0.32"
          vector-effect="non-scaling-stroke"/>
  </g>

</g>

  <!-- Two-line tagline (Option B) -->
  <g font-family="Public Sans, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
     font-weight="400" font-size="38" fill="#FFFFFF" letter-spacing="0.8">

    <text x="420" y="180">
      From Early Concept
      <tspan x="420" dy="48">to Industrial Scale</tspan>
    </text>

  </g>

</svg>

