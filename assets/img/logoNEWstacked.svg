<?xml version="1.0" encoding="UTF-8"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="1024"
    height="1024"
    viewBox="0 0 1024 1024"
>
  <rect
    x="0"
    y="0"
    width="1024"
    height="1024"
    rx="8"
    ry="8"
    fill="#0F3B46"
  />

  <!-- VAIRA: larger, slightly tighter tracking, a bit lower -->
  <text
    x="50%"
    y="36%"
    text-anchor="middle"
    fill="#FFFFFF"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="170"
    letter-spacing="14"
  >
    VAIRA
  </text>

  <!-- TECHNOLOGY: closer to VAIRA -->
  <text
    x="50%"
    y="53%"
    text-anchor="middle"
    fill="#FFFFFF"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="72"
    letter-spacing="8"
  >
    TECHNOLOGY
  </text>

  <!-- PARTNERS: same size, equal-ish gap -->
  <text
    x="50%"
    y="64%"
    text-anchor="middle"
    fill="#FFFFFF"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="72"
    letter-spacing="8"
  >
    PARTNERS
  </text>
</svg>
