<svg width="200mm" height="200mm" viewBox="0 0 200 200"
     xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="200" height="200" rx="8" ry="8" fill="#2b4e5a"/>

  <!-- VAIRA (hero, slightly above center, +5 tracking) -->
  <text x="100" y="92"
        font-family="Public Sans"
        font-size="44"
        letter-spacing="5"
        text-anchor="middle"
        fill="#ffffff">
    VAIRA
  </text>

  <!-- TECHNOLOGY (further reduced, closer to VAIRA, weighted lift preserved) -->
  <text x="100" y="118"
        font-family="Public Sans"
        font-size="15"
        letter-spacing="0.8"
        text-anchor="middle"
        fill="#ffffff">
    TECHNOLOGY
  </text>

  <!-- PARTNERS (≈5% smaller, tight gap, slight baseline drop) -->
  <text x="100" y="132"
        font-family="Public Sans"
        font-size="14"
        letter-spacing="0.8"
        text-anchor="middle"
        fill="#ffffff">
    PARTNERS
  </text>

</svg>


