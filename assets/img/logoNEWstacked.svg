<svg width="200mm" height="200mm" viewBox="0 0 200 200"
     xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="200" height="200" rx="8" ry="8" fill="#2b4e5a"/>

  <!-- VAIRA (slightly above center, +5 tracking) -->
  <text x="100" y="92"
        font-family="Public Sans"
        font-size="44"
        letter-spacing="5"
        text-anchor="middle"
        fill="#ffffff">
    VAIRA
  </text>

  <!-- TECHNOLOGY (narrower, tight tracking, optically centered) -->
  <text x="100" y="122"
        font-family="Public Sans"
        font-size="20"
        letter-spacing="1"
        text-anchor="middle"
        fill="#ffffff">
    TECHNOLOGY
  </text>

  <!-- PARTNERS (≈5% smaller, tighter gap, slightly lower baseline) -->
  <text x="100" y="142"
        font-family="Public Sans"
        font-size="19"
        letter-spacing="1"
        text-anchor="middle"
        fill="#ffffff">
    PARTNERS
  </text>

</svg>
