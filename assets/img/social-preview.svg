<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050509"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A1A1F" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.18"/>

  <!-- Left block -->
  <text x="80" y="300"
        fill="#FFFFFF"
        font-family="Inter Tight, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="48"
        font-weight="700"
        letter-spacing="0.18em">
    VAIRA
  </text>

  <text x="80" y="340"
        fill="#9FA3B2"
        font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20"
        font-weight="500"
        letter-spacing="0.22em">
    TECHNOLOGY
  </text>

  <rect x="80" y="360" width="120" height="4" fill="#00D1FF"/>

  <!-- Right block -->
  <text x="520" y="290"
        fill="#FFFFFF"
        font-family="Inter Tight, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="40"
        font-weight="700">
    Deep‑Tech &amp; Advanced
  </text>

  <text x="520" y="340"
        fill="#FFFFFF"
        font-family="Inter Tight, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="40"
        font-weight="700">
    Manufacturing Consulting
  </text>

  <text x="520" y="400"
        fill="#C4C7D4"
        font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22"
        font-weight="500">
    From early concept to industrial scale.
  </text>

  <text x="520" y="450"
        fill="#7C8194"
        font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="16"
        font-weight="400">
    Deep‑tech, automation &amp; advanced manufacturing consulting based in Switzerland.
  </text>

  <circle cx="1080" cy="120" r="10" fill="none" stroke="#00D1FF" stroke-width="2"/>
  <circle cx="1080" cy="120" r="4" fill="#00D1FF"/>
