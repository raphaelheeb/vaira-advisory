            stroke="#222" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Right-Side Extension (widescreen adaptation) -->
  <line x1="420" y1="180" x2="900" y2="180" stroke="#222" stroke-width="2" stroke-linecap="round"/>
  <line x1="420" y1="337.5" x2="1100" y2="337.5" stroke="#222" stroke-width="2" stroke-linecap="round"/>
  <line x1="420" y1="495" x2="900" y2="495" stroke="#222" stroke-width="2" stroke-linecap="round"/>

  <!-- Vertical Anchor on the Right -->
