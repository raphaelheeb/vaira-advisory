<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Label -->
  <text x="40" y="60" font-family="Inter, sans-serif" font-size="20" font-weight="500" fill="#333" letter-spacing="1px">
    LEADERSHIP
  </text>

  <!-- Left Crosshair (scaled-up version of your icon) -->
  <line x1="200" y1="150" x2="200" y2="525" stroke="#222" stroke-width="2" stroke-linecap="round"/>
  <line x1="50"  y1="337.5" x2="350" y2="337.5" stroke="#222" stroke-width="2" stroke-linecap="round"/>

  <!-- Diagonal Directional Line (same logic as your icon) -->
