<svg width="80mm" height="50mm" viewBox="0 0 80 50" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="80" height="50" fill="#FFFFFF"/>

  <!-- ZONE 1: NAME + TITLE (LEFT COLUMN, TOP) -->
  <rect x="21" y="10" width="28" height="14"
        fill="none" stroke="#2B4E5A" stroke-width="0.4"/>
  <text x="22" y="18" font-size="3" fill="#2B4E5A">ZONE 1</text>

  <!-- ZONE 2: CONTACT BLOCK (LEFT COLUMN, BOTTOM) -->
  <rect x="21" y="28" width="28" height="14"
        fill="none" stroke="#2B4E5A" stroke-width="0.4"/>
  <text x="22" y="36" font-size="3" fill="#2B4E5A">ZONE 2</text>

  <!-- ZONE 3: QR CODE (RIGHT COLUMN, ALIGNED WITH ZONE 1) -->
  <rect x="49" y="10" width="14" height="14"
        fill="none" stroke="#2B4E5A" stroke-width="0.4"/>
  <text x="56" y="8" font-size="3" fill="#2B4E5A" text-anchor="middle">ZONE 3</text>

</svg>
