<svg width="80mm" height="50mm" viewBox="0 0 80 50" xmlns="http://www.w3.org/2000/svg">
  <style>
    text {
      font-family: -apple-system, system-ui, "Public Sans", sans-serif;
    }
  </style>

  <!-- Background -->
  <rect width="80" height="50" fill="#FFFFFF"/>

  <!-- 1) NAME + TITLE ZONE (IDENTITY) -->
  <!-- Left column, upper band -->
  <rect x="21" y="10" width="34" height="14" fill="none" stroke="#2B4E5A" stroke-width="0.3"/>
  <text x="22" y="15" font-size="3" fill="#2B4E5A">1. Name + Title</text>

  <!-- 2) CONTACT DETAILS ZONE -->
  <!-- Left column, lower band -->
  <rect x="21" y="28" width="34" height="16" fill="none" stroke="#2B4E5A" stroke-width="0.3"/>
  <text x="22" y="33" font-size="3" fill="#2B4E5A">2. Contact block</text>

  <!-- 3) QR CODE ZONE -->
  <!-- Right column, vertically centered between identity and contact -->
  <rect x="45" y="16" width="14" height="14" fill="none" stroke="#2B4E5A" stroke-width="0.3"/>
  <text x="52" y="14" font-size="3" fill="#2B4E5A" text-anchor="middle">3. QR</text>
</svg>
