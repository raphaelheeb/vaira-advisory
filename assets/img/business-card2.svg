<svg width="80mm" height="50mm" viewBox="0 0 80 50" xmlns="http://www.w3.org/2000/svg">
  <style>
    text {
      font-family: -apple-system, system-ui, "Public Sans", sans-serif;
    }
  </style>

  <!-- Background -->
  <rect width="80" height="50" fill="#FFFFFF"/>

  <!-- Text block (left column) -->
  <g fill="#2B4E5A">
    <!-- Name -->
    <text x="21" y="16" font-size="4.2" font-weight="500" letter-spacing="0.2">
      Dr. Raphael Heeb
    </text>

    <!-- Title -->
    <text x="21" y="22" font-size="3.4" font-weight="400">
      Founder &amp; Managing Partner
    </text>

    <!-- Phone -->
    <text x="21" y="30" font-size="3.0" font-weight="400">
      +41 76 463 06 83
    </text>

    <!-- Email -->
    <text x="21" y="34" font-size="3.0" font-weight="400">
      raphael.heeb@vaira.ch
    </text>

    <!-- Website -->
    <text x="21" y="38" font-size="3.0" font-weight="400" letter-spacing="0.3">
      www.vaira.ch
    </text>
  </g>

  <!-- QR block (right column) -->
  <!-- Frame (optional, matches brand teal) -->
  <rect
    x="45"
    y="30"
    width="14"
    height="14"
    fill="none"
    stroke="#2B4E5A"
    stroke-width="0.6"
    rx="2"
    ry="2"
  />

  <!-- QR code placeholder area (exact 14×14 mm) -->
  <!-- Replace this with your actual QR image at the same size -->
  <!-- Example if you embed an image:
       <image x="45" y="30" width="14" height="14" href="YOUR_QR_IMAGE.png" />
  -->
  <rect x="45" y="30" width="14" height="14" fill="#FFFFFF"/>

</svg>
