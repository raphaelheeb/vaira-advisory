<svg width="1584" height="396" viewBox="0 0 1584 396" xmlns="http://www.w3.org/2000/svg" overflow="visible" style="overflow:visible">
  <defs>
    <linearGradient id="heroFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.24"/>
      <stop offset="20%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="cadStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#B8D4D0" stop-opacity="1"/>
      <stop offset="1" stop-color="#B8D4D0" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <rect width="1584" height="396" fill="#2B4E5A"/>
  <rect width="1584" height="396" fill="url(#heroFade)" opacity="0.24"/>

  <!-- CAD hero: NO transforms that leave the viewBox -->
  <g opacity="1">
    <!-- Horizontal curves (extended beyond right edge by coordinates) -->
    <path d="M900 180 C1100 80, 1500 80, 1700 180"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.32"
          vector-effect="non-scaling-stroke"/>
    <path d="M880 230 C1080 130, 1520 130, 1720 230"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.32"
          vector-effect="non-scaling-stroke"/>
    <path d="M870 280 C1080 200, 1520 200, 1730 280"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.32"
          vector-effect="non-scaling-stroke"/>
    <path d="M880 330 C1100 260, 1500 260, 1720 330"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.32"
          vector-effect="non-scaling-stroke"/>

    <!-- Vertical curves -->
    <path d="M1050 120 C1030 200, 1030 300, 1050 380"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.32"
          vector-effect="non-scaling-stroke"/>
    <path d="M1120 100 C1100 200, 1100 320, 1120 400"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.32"
          vector-effect="non-scaling-stroke"/>
    <path d="M1190 90 C1170 200, 1170 330, 1190 420"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.32"
          vector-effect="non-scaling-stroke"/>

    <!-- Framing lines -->
    <path d="M900 140 L1500 140"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.28"
          vector-effect="non-scaling-stroke"/>
    <path d="M900 360 L1500 360"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.28"
          vector-effect="non-scaling-stroke"/>
  </g>

  <!-- Tagline -->
  <g font-family="Public Sans, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
     font-weight="400" font-size="50" fill="#FFFFFF" letter-spacing="0.8">
    <text x="360" y="190">Technology from Early Concept</text>
    <text x="360" y="250">to Industrial Scale</text>
  </g>
</svg>
