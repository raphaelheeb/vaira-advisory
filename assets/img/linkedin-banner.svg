<svg width="1584" height="396" viewBox="0 0 1584 396"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="heroFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.24"/>
      <stop offset="20%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- TOP-RIGHT QUADRANT CLIP (after rotation + flip) -->
    <clipPath id="topRight">
      <rect x="210" y="0" width="210" height="210"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="#2B4E5A"/>
  <rect width="1584" height="396" fill="url(#heroFade)" opacity="0.24"/>

  <!-- Rotated + horizontally flipped motif -->

<g fill="none" stroke="white" stroke-linecap="round">

  <!-- OUTER ARC: 120° → 180°, R = 155 -->
  <path d="
    M 1504.75 134.2
    A 155 155 0 0 1 1429 0
  "
    stroke-width="1.35" stroke-opacity="0.55"/>

  <!-- MICRO ARC: 128° → 180°, R = 140 -->
  <path d="
    M 1497.7 110.3
    A 140 140 0 0 1 1444 0
  "
    stroke-width="0.6" stroke-opacity="0.32"/>

  <!-- INNER ARC: 135° → 180°, R = 115 -->
  <path d="
    M 1502.7 81.3
    A 115 115 0 0 1 1469 0
  "
    stroke-width="1.0" stroke-opacity="0.40"/>

  <!-- RADIAL LINE (dual-weight pointer) -->
  <line x1="1584" y1="0"
        x2="1488.4" y2="94.2"
        stroke-width="1.15" stroke-opacity="0.48"/>
  <line x1="1510" y1="70"
        x2="1488.4" y2="94.2"
        stroke-width="0.7" stroke-opacity="0.40"/>

  <!-- TICK 1 (outer, longest) -->
  <line x1="1523.0" y1="54.8"
        x2="1531.0" y2="62.8"
        stroke-width="0.85" stroke-opacity="0.36"/>

  <!-- TICK 2 (middle, slightly closer than geometric center) -->
  <line x1="1547.0" y1="25.8"
        x2="1559.0" y2="37.8"
        stroke-width="0.85" stroke-opacity="0.38"/>

  <!-- TICK 3 (inner micro‑tick, shortest) -->
  <line x1="1564.5" y1="12.3"
        x2="1570.8" y2="18.6"
        stroke-width="0.70" stroke-opacity="0.44"/>

</g>


  <!-- Tagline -->
  <g font-family="Public Sans, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
     font-weight="400" font-size="44" fill="#FFFFFF" letter-spacing="0.8">
    <text x="360" y="200">Technology from Early Concept to Industrial Scale</text>
  </g>

</svg>
