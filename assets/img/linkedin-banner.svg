<svg width="1584" height="396" viewBox="0 0 1584 396"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="heroFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.24"/>
      <stop offset="20%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- TOP-RIGHT QUADRANT CLIP (after rotation + flip) -->
    <clipPath id="topRight">
      <rect x="210" y="0" width="210" height="210"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="#2B4E5A"/>
  <rect width="1584" height="396" fill="url(#heroFade)" opacity="0.24"/>

  <!-- Rotated + horizontally flipped motif -->
  <g transform="
        translate(1280,16)
        scale(0.50)
        rotate(-90 210 210)
        translate(420,0) scale(-1,1)
      "
     fill="none" clip-path="url(#topRight)">

    <!-- OUTER ARC (60° sweep) -->
    <path d="M 210 20 A 190 190 0 0 1 374.64 115"
          stroke="white" stroke-width="1.4" stroke-opacity="0.50"/>

    <!-- INNER ARC (45° sweep) -->
    <path d="M 210 60 A 150 150 0 0 1 316.06 103.94"
          stroke="white" stroke-width="1.0" stroke-opacity="0.35"/>

    <!-- RADIAL LINE (now pointing down-left after transforms) -->
    <line x1="210" y1="210" x2="316.06" y2="103.94"
          stroke="white" stroke-width="1.0" stroke-opacity="0.40"/>

    <!-- TICKS (recomputed AFTER rotation + flip) -->

    <!-- INNER TICK (30% radius) -->
    <line x1="263.0" y1="157.0"
          x2="237.6" y2="182.4"
          stroke="white" stroke-width="0.9" stroke-opacity="0.35"/>

    <!-- OUTER TICK (60% radius) -->
    <line x1="299.1" y1="120.9"
          x2="282.1" y2="137.9"
          stroke="white" stroke-width="0.8" stroke-opacity="0.28"/>

  </g>

  <!-- Tagline -->
  <g font-family="Public Sans, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
     font-weight="400" font-size="44" fill="#FFFFFF" letter-spacing="0.8">
    <text x="360" y="200">Technology from Early Concept to Industrial Scale</text>
  </g>

</svg>
