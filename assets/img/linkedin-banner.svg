<svg width="1584" height="396" viewBox="0 0 1584 396" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Smooth global fade -->
    <linearGradient id="heroFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="white" stop-opacity="0.24" />
      <stop offset="20%"  stop-color="white" stop-opacity="0.12" />
      <stop offset="100%" stop-color="white" stop-opacity="0.00" />
    </linearGradient>

    <!-- Horizontal CAD stroke gradient (bright → dark) -->
    <linearGradient id="cadStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#B8D4D0" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#B8D4D0" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Solid teal background -->
  <rect x="0" y="0" width="1584" height="396" fill="#2B4E5A"/>

  <!-- Smooth atmospheric fade -->
  <rect x="0" y="0" width="1584" height="396" fill="url(#heroFade)" opacity="0.24"/>

  <!-- CAD illustration (scaled down, moved up, shifted right) -->
  <g transform="translate(1080, -60) scale(0.58)">
    <!-- Horizontal-ish curves -->
    <path d="M80 270 C170 150, 430 150, 520 270"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.12"/>
    <path d="M60 320 C160 210, 440 210, 540 320"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.12"/>
    <path d="M50 370 C160 280, 440 280, 550 370"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.12"/>
    <path d="M60 420 C170 350, 430 350, 540 420"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.12"/>
    <path d="M80 470 C190 420, 410 420, 520 470"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.12"/>

    <!-- Vertical-ish curves -->
    <path d="M180 180 C160 260, 160 360, 180 440"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.12"/>
    <path d="M240 160 C220 250, 220 370, 240 460"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.12"/>
    <path d="M300 150 C280 250, 280 380, 300 480"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.12"/>
    <path d="M360 160 C340 250, 340 370, 360 460"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.12"/>
    <path d="M420 180 C400 260, 400 360, 420 440"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.12"/>

    <!-- Framing lines -->
    <path d="M100 140 L500 140"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.10"/>
    <path d="M100 500 L500 500"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.10"/>
    <path d="M120 120 L120 520"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.10"/>
    <path d="M480 120 L480 520"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.10"/>
  </g>

  <!-- Tagline block (centered vertically, left-aligned, airy weight) -->
  <g font-family="Public Sans, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
     font-weight="400" font-size="50" fill="#FFFFFF"
     letter-spacing="0.8">
    <text x="520" y="190">Technology from Early Concept</text>
    <text x="520" y="250">to Industrial Scale</text>
  </g>

  <!-- Badge (moved up, slightly enlarged) -->
  <g transform="translate(120, 110) scale(1.10)">
    <svg viewBox="2 2 206 206" width="140" height="140">
      <path
        d="M 20 5 H 190 A 15 15 0 0 1 205 20 V 190 A 15 15 0 0 1 190 205 H 20 A 15 15 0 0 1 5 190 V 20 A 15 15 0 0 1 20 5 Z"
        fill="#2b4e5a"
        stroke="#2b4e5a"
        stroke-width="6"
      />
      <g transform="translate(7, 16) scale(1.01)">
        <path fill="#ffffff"
          d="M 26.957886,97.719615 11.306715,64.411182 h 5.561484 L 30.331245,92.882294 43.794292,64.411182 h 5.561484 L 33.734995,97.719615 Z m 21.850224,0 15.894295,-33.308433 h 6.351641 L 86.948342,97.719615 H 81.204514 L 76.889046,88.5978 h -18.02164 l -4.34586,9.121815 z M 60.356547,84.681874 H 75.339124 L 67.863031,68.580495 Z M 90.746442,97.719615 V 64.411182 h 5.622266 v 33.308433 z m 15.815008,0 V 64.411182 h 17.01875 q 4.74093,0 7.93195,1.105674 3.19101,1.08264 4.77133,3.132744 1.58031,2.027068 1.58031,4.860358 0,2.718116 -1.27641,4.514836 -1.24601,1.79672 -3.19102,2.902395 -1.94499,1.082638 -4.04195,1.681545 l 8.63094,15.110881 h -5.95656 l -8.02313,-14.350729 h -11.82195 v 14.350729 z m 5.62226,-17.875066 h 9.57305 q 4.95367,0 7.65844,-1.520302 2.70476,-1.543336 2.70476,-4.560905 0,-2.948465 -2.43125,-4.399662 -2.40086,-1.474232 -6.59477,-1.474232 h -10.91023 z m 30.82793,17.875066 15.8943,-33.308433 h 6.35164 l 15.8943,33.308433 h -5.74383 L 171.09258,88.5978 h -18.02164 l -4.34586,9.121815 z m 11.54844,-13.037741 h 14.98258 l -7.4761,-16.101379 z"
