<svg width="1584" height="396" viewBox="0 0 1584 396" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Smooth global fade -->
    <linearGradient id="heroFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="white" stop-opacity="0.24" />
      <stop offset="20%"  stop-color="white" stop-opacity="0.12" />
      <stop offset="100%" stop-color="white" stop-opacity="0.00" />
    </linearGradient>

    <!-- CAD stroke gradient -->
    <linearGradient id="cadStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#B8D4D0" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#B8D4D0" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Teal background -->
  <rect x="0" y="0" width="1584" height="396" fill="#2B4E5A"/>

  <!-- Atmospheric fade -->
  <rect x="0" y="0" width="1584" height="396" fill="url(#heroFade)" opacity="0.24"/>

  <!-- CAD hero (strong integration: larger, left/down, overlapping right third, extending beyond) -->
  <g transform="translate(980, -10) scale(0.78)">
    <!-- Horizontal-ish curves -->
    <path d="M80 270 C170 150, 430 150, 520 270"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.20"/>
    <path d="M60 320 C160 210, 440 210, 540 320"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.20"/>
    <path d="M50 370 C160 280, 440 280, 550 370"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.20"/>
    <path d="M60 420 C170 350, 430 350, 540 420"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.20"/>
    <path d="M80 470 C190 420, 410 420, 520 470"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.20"/>

    <!-- Vertical-ish curves -->
    <path d="M180 180 C160 260, 160 360, 180 440"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.20"/>
    <path d="M240 160 C220 250, 220 370, 240 460"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.20"/>
    <path d="M300 150 C280 250, 280 380, 300 480"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.20"/>
    <path d="M360 160 C340 250, 340 370, 360 460"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.20"/>
    <path d="M420 180 C400 260, 400 360, 420 440"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.20"/>

    <!-- Framing lines -->
    <path d="M100 140 L500 140"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.18"/>
    <path d="M100 500 L500 500"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.18"/>
    <path d="M120 120 L120 520"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.18"/>
    <path d="M480 120 L480 520"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8" stroke-opacity="0.18"/>
  </g>

  <!-- Tagline block (360px margin, vertically centered band, airy) -->
  <g font-family="Public Sans, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
     font-weight="400" font-size="50" fill="#FFFFFF"
     letter-spacing="0.8">
    <text x="360" y="190">Technology from Early Concept</text>
    <text x="360" y="250">to Industrial Scale</text>
  </g>
</svg>
