<svg width="1584" height="396" viewBox="0 0 1584 396"
     xmlns="http://www.w3.org/2000/svg"
     overflow="visible"
     style="overflow:visible">

  <defs>
    <linearGradient id="heroFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.24"/>
      <stop offset="20%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="cadStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#B8D4D0" stop-opacity="1"/>
      <stop offset="1" stop-color="#B8D4D0" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <rect width="1584" height="396" fill="#2B4E5A"/>
  <rect width="1584" height="396" fill="url(#heroFade)" opacity="0.24"/>

  <!-- CAD HERO -->
  <g transform="translate(980, -10) scale(0.78)"
     overflow="visible"
     style="overflow:visible"
     clip-path="none">

    <!-- Horizontal curves -->
    <path d="M80 270 C170 150, 430 150, 520 270"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8"
          stroke-opacity="0.32" vector-effect="non-scaling-stroke"/>
    <path d="M60 320 C160 210, 440 210, 540 320"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8"
          stroke-opacity="0.32" vector-effect="non-scaling-stroke"/>
    <path d="M50 370 C160 280, 440 280, 550 370"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8"
          stroke-opacity="0.32" vector-effect="non-scaling-stroke"/>
    <path d="M60 420 C170 350, 430 350, 540 420"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8"
          stroke-opacity="0.32" vector-effect="non-scaling-stroke"/>
    <path d="M80 470 C190 420, 410 420, 520 470"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8"
          stroke-opacity="0.32" vector-effect="non-scaling-stroke"/>

    <!-- Vertical curves -->
    <path d="M180 180 C160 260, 160 360, 180 440"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8"
          stroke-opacity="0.32" vector-effect="non-scaling-stroke"/>
    <path d="M240 160 C220 250, 220 370, 240 460"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8"
          stroke-opacity="0.32" vector-effect="non-scaling-stroke"/>
    <path d="M300 150 C280 250, 280 380, 300 480"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8"
          stroke-opacity="0.32" vector-effect="non-scaling-stroke"/>
    <path d="M360 160 C340 250, 340 370, 360 460"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8"
          stroke-opacity="0.32" vector-effect="non-scaling-stroke"/>
    <path d="M420 180 C400 260, 400 360, 420 440"
          fill="none" stroke="url(#cadStroke)" stroke-width="1.8"
          stroke-opacity="0.32" vector-effect="non-scaling-stroke"/>
  </g>

  <!-- Tagline (lowered by 16px) -->
  <g font-family="Public Sans, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
     font-weight="400" font-size="54" fill="#FFFFFF" letter-spacing="0.8">
    <text x="360" y="192">Technology from Early Concept</text>
    <text x="360" y="252">to Industrial Scale</text>
  </g>
</svg>

