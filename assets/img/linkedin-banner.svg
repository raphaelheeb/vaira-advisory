<svg width="1584" height="396" viewBox="0 0 1584 396"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="heroFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.24"/>
      <stop offset="20%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Bottom-left quadrant -->
    <clipPath id="bottomLeft">
      <rect x="0" y="210" width="210" height="210"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="#2B4E5A"/>
  <rect width="1584" height="396" fill="url(#heroFade)" opacity="0.24"/>

  <!-- Quadrant motif -->
  <g transform="translate(1280, -40) scale(0.50)" fill="none" clip-path="url(#bottomLeft)">

    <!-- Circles -->
    <circle cx="210" cy="210" r="190"
            stroke="white" stroke-width="1.4" stroke-opacity="0.50"/>
    <circle cx="210" cy="210" r="150"
            stroke="white" stroke-width="1.0" stroke-opacity="0.35"/>

    <!-- TRUE radial line at 45° inside the bottom-left quadrant -->
    <!-- 45° down-left = 225° absolute -->
    <!-- Endpoint computed directly: -->
    <!-- x = 210 + cos(225°) * 190 -->
    <!-- y = 210 + sin(225°) * 190 -->
    <!-- = (210 - 134.35, 210 + 134.35) -->
    <line x1="210" y1="210"
          x2="75.65" y2="344.35"
          stroke="red" stroke-width="6"/>

    <!-- INNER tick (larger) at 30% radius -->
    <!-- 30% of 190 = 57 -->
    <!-- tick center at 210 + cos(225°)*57, 210 + sin(225°)*57 -->
    <!-- = (210 - 40.3, 210 + 40.3) -->
    <line x1="160.3" y1="250.3"
          x2="190.3" y2="280.3"
          stroke="red" stroke-width="4"/>

    <!-- OUTER tick (smaller) at 60% radius -->
    <!-- 60% of 190 = 114 -->
    <!-- = (210 - 80.6, 210 + 80.6) -->
    <line x1="129.4" y1="290.6"
          x2="150.4" y2="311.6"
          stroke="red" stroke-width="3"/>

  </g>

  <!-- Tagline -->
  <g font-family="Public Sans, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
     font-weight="400" font-size="44" fill="#FFFFFF" letter-spacing="0.8">
    <text x="360" y="200">Technology from Early Concept to Industrial Scale</text>
  </g>

</svg>
