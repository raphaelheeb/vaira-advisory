<svg width="85mm" height="55mm" viewBox="0 0 85 55" xmlns="http://www.w3.org/2000/svg">
  <style>
    text {
      font-family: -apple-system, system-ui, "Public Sans", sans-serif;
    }
  </style>

  <!-- Background (CMYK-safe teal) -->
  <rect width="85" height="55" fill="#2B4E5A"/>

  <defs>
    <!-- Regular grid fade (optimized for print) -->
    <linearGradient id="gridCombinedFade" x1="0" y1="0" x2="85" y2="55" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.015"/>
      <stop offset="20%"  stop-color="#FFFFFF" stop-opacity="0.045"/>
      <stop offset="50%"  stop-color="#FFFFFF" stop-opacity="0.045"/>
      <stop offset="80%"  stop-color="#FFFFFF" stop-opacity="0.045"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.015"/>
    </linearGradient>

    <!-- Center line fade (optimized for print) -->
    <linearGradient id="centerCombinedFade" x1="0" y1="0" x2="85" y2="55" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="20%"  stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="50%"  stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="80%"  stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <!-- Grid Lines (centered on 42.5) -->
  <g stroke-width="0.25">
    <line x1="12.5" y1="0" x2="12.5" y2="50" stroke="url(#gridCombinedFade)"/>
    <line x1="22.5" y1="0" x2="22.5" y2="50" stroke="url(#gridCombinedFade)"/>
    <line x1="32.5" y1="0" x2="32.5" y2="50" stroke="url(#gridCombinedFade)"/>
    <line x1="42.5" y1="0" x2="42.5" y2="50" stroke="url(#centerCombinedFade)"/> <!-- center -->
    <line x1="52.5" y1="0" x2="52.5" y2="50" stroke="url(#gridCombinedFade)"/>
    <line x1="62.5" y1="0" x2="62.5" y2="50" stroke="url(#gridCombinedFade)"/>
    <line x1="72.5" y1="0" x2="72.5" y2="50" stroke="url(#gridCombinedFade)"/>
  </g>

  <!-- Quiet Zones (centered on 42.5) -->
  <!-- Capsule: width 35 → x = 42.5 - 17.5 = 25 -->
  <rect x="25" y="16.4" width="35" height="13.2" rx="4" ry="4" fill="#2B4E5A"/>
  <!-- Lower bar: width 80 → x = 42.5 - 40 = 2.5 -->
  <rect x="2.5" y="36.33" width="80" height="5.50" fill="#2B4E5A"/>
  <!-- Bottom bar: width 50.47 → x = 42.5 - 25.235 ≈ 17.27 -->
