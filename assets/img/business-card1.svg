<svg width="80mm" height="50mm" viewBox="0 0 80 50" xmlns="http://www.w3.org/2000/svg">
  <style>
    text {
      font-family: -apple-system, system-ui, "Public Sans", sans-serif;
    }
  </style>

  <!-- Background -->
  <rect width="80" height="50" fill="#2B4E5A"/>

  <!-- ========================= -->
  <!-- Quiet Zone Boundaries     -->
  <!-- ========================= -->
  <!-- Wordmark quiet zone: 17.06–25.24 mm -->
  <!-- Upper tagline quiet zone: 36.33–41.83 mm -->
  <!-- Lower tagline quiet zone: 40.93–46.43 mm -->

  <!-- ========================= -->
  <!-- Fade Masks                -->
  <!-- ========================= -->
  <defs>
    <!-- Generic vertical fade mask template -->
    <linearGradient id="fadeMask" gradientUnits="userSpaceOnUse" x1="0" x2="0" y1="0" y2="50">
      <!-- Top region -->
      <stop offset="0%" stop-opacity="0.10"/>
      <stop offset="34.12%" stop-opacity="0.10"/> <!-- 17.06mm / 50mm -->

      <!-- Wordmark quiet zone -->
      <stop offset="34.12%" stop-opacity="0.00"/>
      <stop offset="50.48%" stop-opacity="0.00"/> <!-- 25.24mm / 50mm -->

      <!-- Gap region -->
      <stop offset="50.48%" stop-opacity="0.10"/>
      <stop offset="72.66%" stop-opacity="0.10"/> <!-- 36.33mm / 50mm -->

      <!-- Upper tagline quiet zone -->
      <stop offset="72.66%" stop-opacity="0.00"/>
      <stop offset="83.66%" stop-opacity="0.00"/> <!-- 41.83mm / 50mm -->

      <!-- Lower tagline quiet zone -->
      <stop offset="81.86%" stop-opacity="0.00"/> <!-- 40.93mm / 50mm -->
      <stop offset="92.86%" stop-opacity="0.00"/> <!-- 46.43mm / 50mm -->

      <!-- Bottom region -->
      <stop offset="92.86%" stop-opacity="0.10"/>
      <stop offset="100%" stop-opacity="0.10"/>
    </linearGradient>

    <!-- Mask object -->
    <mask id="gridFadeMask">
      <rect width="80" height="50" fill="url(#fadeMask)"/>
    </mask>
  </defs>

  <!-- ========================= -->
  <!-- Center Line (Solid)       -->
  <!-- ========================= -->
  <line x1="40" y1="0" x2="40" y2="50"
        stroke="rgba(255,255,255,0.28)"
        stroke-width="0.25"/>

  <!-- ========================= -->
  <!-- Grid Lines (Faded)        -->
  <!-- ========================= -->
  <g stroke-width="0.25" stroke="rgba(255,255,255,0.10)" mask="url(#gridFadeMask)">
    <line x1="10" y1="0" x2="10" y2="50"/>
    <line x1="20" y1="0" x2="20" y2="50"/>
    <line x1="30" y1="0" x2="30" y2="50"/>
    <line x1="40" y1="0" x2="40" y2="50"/>
    <line x1="50" y1="0" x2="50" y2="50"/>
    <line x1="60" y1="0" x2="60" y2="50"/>
    <line x1="70" y1="0" x2="70" y2="50"/>
  </g>

  <!-- ========================= -->
  <!-- Wordmark (Centered)       -->
  <!-- ========================= -->
  <path fill="#FFFFFF"
        transform="translate(40,23) scale(0.188) translate(-85,-80)"
        d="M 26.957886,97.719615 11.306715,64.411182 h 5.561484 L 30.331245,92.882294 43.794292,64.411182 h 5.561484 L 33.734995,97.719615 Z m 21.850224,0 15.894295,-33.308433 h 6.351641 L 86.948342,97.719615 H 81.204514 L 76.889046,88.5978 h -18.02164 l -4.34586,9.121815 z M 60.356547,84.681874 H 75.339124 L 67.863031,68.580495 Z M 90.746442,97.719615 V 64.411182 h 5.622266 v 33.308433 z m 15.815008,0 V 64.411182 h 17.01875 q 4.74093,0 7.93195,1.105674 3.19101,1.08264 4.77133,3.132744 1.58031,2.027068 1.58031,4.860358 0,2.718116 -1.27641,4.514836 -1.24601,1.79672 -3.19102,2.902395 -1.94499,1.082638 -4.04195,1.681545 l 8.63094,15.110881 h -5.95656 l -8.02313,-14.350729 h -11.82195 v 14.350729 z m 5.62226,-17.875066 h 9.57305 q 4.95367,0 7.65844,-1.520302 2.70476,-1.543336 2.70476,-4.560905 0,-2.948465 -2.43125,-4.399662 -2.40086,-1.474232 -6.59477,-1.474232 h -10.91023 z m 30.82793,17.875066 15.8943,-33.308433 h 6.35164 l 15.8943,33.308433 h -5.74383 L 171.09258,88.5978 h -18.02164 l -4.34586,9.121815 z m 11.54844,-13.037741 h 14.98258 l -7.4761,-16.101379 z"
  />

  <!-- ========================= -->
  <!-- Tagline (Two Lines)       -->
  <!-- ========================= -->
  <text x="40" y="40.4" font-size="3.6" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.3">
    Technology from Early Concept
  </text>
  <text x="40" y="45.0" font-size="3.6" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.3">
    to Industrial Scale
  </text>

</svg>
