<svg width="85mm" height="55mm" viewBox="0 0 85 55" xmlns="http://www.w3.org/2000/svg">
  <style>
    text {
      font-family: -apple-system, system-ui, "Public Sans", sans-serif;
    }
  </style>

  <!-- Background (CMYK-safe teal) -->
  <rect width="85" height="55" fill="#2B4E5A"/>

  <defs>
    <!-- Regular grid fade (optimized for print) -->
    <linearGradient id="gridCombinedFade" x1="0" y1="0" x2="85" y2="55" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.015"/>
      <stop offset="20%"  stop-color="#FFFFFF" stop-opacity="0.045"/>
      <stop offset="50%"  stop-color="#FFFFFF" stop-opacity="0.045"/>
      <stop offset="80%"  stop-color="#FFFFFF" stop-opacity="0.045"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.015"/>
    </linearGradient>

    <!-- Center line fade (optimized for print) -->
    <linearGradient id="centerCombinedFade" x1="0" y1="0" x2="85" y2="55" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="20%"  stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="50%"  stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="80%"  stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <!-- Grid Lines (with fades) -->
  <g stroke-width="0.25">
    <line x1="10" y1="0" x2="10" y2="50" stroke="url(#gridCombinedFade)"/>
    <line x1="20" y1="0" x2="20" y2="50" stroke="url(#gridCombinedFade)"/>
    <line x1="30" y1="0" x2="30" y2="50" stroke="url(#gridCombinedFade)"/>
    <line x1="40" y1="0" x2="40" y2="50" stroke="url(#centerCombinedFade)"/> <!-- center -->
    <line x1="50" y1="0" x2="50" y2="50" stroke="url(#gridCombinedFade)"/>
    <line x1="60" y1="0" x2="60" y2="50" stroke="url(#gridCombinedFade)"/>
    <line x1="70" y1="0" x2="70" y2="50" stroke="url(#gridCombinedFade)"/>
  </g>

  <!-- Quiet Zones (solid teal) -->
  <rect x="21" y="16.4" width="35" height="13.2" rx="4" ry="4" fill="#2B4E5A"/>
  <rect x="0" y="36.33" width="80" height="5.50" fill="#2B4E5A"/>
  <rect x="14.77" y="40.93" width="50.47" height="5.50" fill="#2B4E5A"/>

 <!-- Wordmark (optically centered) -->
<path fill="#FFFFFF"
      transform="translate(42.5,23) scale(0.188) translate(-85,-80)"
      d="M 26.957886,97.719615 ... z"
 />

<!-- Tagline (slightly larger for print clarity) -->
<text x="42.5" y="40.4" font-size="3.8" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.35">
  Technology from Early Concept
</text>
<text x="42.5" y="45.0" font-size="3.8" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.35">
  to Industrial Scale
</text>

</svg>
