<svg width="80mm" height="50mm" viewBox="0 0 80 50" xmlns="http://www.w3.org/2000/svg">
  <style>
    text {
      font-family: -apple-system, system-ui, "Public Sans", sans-serif;
    }
  </style>

  <rect width="80" height="50" fill="#2B4E5A"/>

  <!-- Medium vertical fade -->
  <defs>
    <linearGradient id="vfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="35%"  stop-color="rgba(255,255,255,0.20)"/>
      <stop offset="65%"  stop-color="rgba(255,255,255,0.20)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>

    <!-- Stronger elliptical radial fade -->
    <radialGradient id="radialMask" cx="0.5" cy="0.58" r="0.75" fx="0.5" fy="0.58">
      <stop offset="0%"   stop-color="white" stop-opacity="1.0"/>
      <stop offset="55%"  stop-color="white" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.25"/>
    </radialGradient>

    <mask id="gridMask">
      <rect width="80" height="50" fill="url(#radialMask)"/>
    </mask>
  </defs>

  <!-- Grid lines (3-region split) -->
  <g stroke-width="0.25" mask="url(#gridMask)">
    <!-- Regions: [0–4.8], [18.6–39.5], [45.9–50] -->

    <!-- x = 10 -->
    <line x1="10" y1="0"    x2="10" y2="4.8"   stroke="rgba(255,255,255,0.08)"/>
    <line x1="10" y1="18.6" x2="10" y2="39.5"  stroke="rgba(255,255,255,0.08)"/>
    <line x1="10" y1="45.9" x2="10" y2="50"    stroke="rgba(255,255,255,0.08)"/>

    <!-- x = 20 -->
    <line x1="20" y1="0"    x2="20" y2="4.8"   stroke="rgba(255,255,255,0.10)"/>
    <line x1="20" y1="18.6" x2="20" y2="39.5"  stroke="rgba(255,255,255,0.10)"/>
    <line x1="20" y1="45.9" x2="20" y2="50"    stroke="rgba(255,255,255,0.10)"/>

    <!-- x = 30 -->
    <line x1="30" y1="0"    x2="30" y2="4.8"   stroke="rgba(255,255,255,0.12)"/>
    <line x1="30" y1="18.6" x2="30" y2="39.5"  stroke="rgba(255,255,255,0.12)"/>
    <line x1="30" y1="45.9" x2="30" y2="50"    stroke="rgba(255,255,255,0.12)"/>

    <!-- x = 40 (center line) -->
    <line x1="40" y1="0"    x2="40" y2="4.8"   stroke="url(#vfade)" stroke-opacity="0.28"/>
    <line x1="40" y1="18.6" x2="40" y2="39.5"  stroke="url(#vfade)" stroke-opacity="0.28"/>
    <line x1="40" y1="45.9" x2="40" y2="50"    stroke="url(#vfade)" stroke-opacity="0.28"/>

    <!-- x = 50 -->
    <line x1="50" y1="0"    x2="50" y2="4.8"   stroke="rgba(255,255,255,0.12)"/>
    <line x1="50" y1="18.6" x2="50" y2="39.5"  stroke="rgba(255,255,255,0.12)"/>
    <line x1="50" y1="45.9" x2="50" y2="50"    stroke="rgba(255,255,255,0.12)"/>

    <!-- x = 60 -->
    <line x1="60" y1="0"    x2="60" y2="4.8"   stroke="rgba(255,255,255,0.10)"/>
    <line x1="60" y1="18.6" x2="60" y2="39.5"  stroke="rgba(255,255,255,0.10)"/>
    <line x1="60" y1="45.9" x2="60" y2="50"    stroke="rgba(255,255,255,0.10)"/>

    <!-- x = 70 -->
    <line x1="70" y1="0"    x2="70" y2="4.8"   stroke="rgba(255,255,255,0.08)"/>
    <line x1="70" y1="18.6" x2="70" y2="39.5"  stroke="rgba(255,255,255,0.08)"/>
    <line x1="70" y1="45.9" x2="70" y2="50"    stroke="rgba(255,255,255,0.08)"/>
  </g>

  <!-- Wordmark (shifted +0.6 mm right, scaled to 0.188) -->
  <g transform="translate(40.6,17.2)">
    <g transform="translate(-16.5,-11) scale(0.188)">
      <g transform="translate(7,16) scale(1.01)">
        <path fill="#FFFFFF"
          d="M 26.957886,97.719615 11.306715,64.411182 h 5.561484 L 30.331245,92.882294 43.794292,64.411182 h 5.561484 L 33.734995,97.719615 Z m 21.850224,0 15.894295,-33.308433 h 6.351641 L 86.948342,97.719615 H 81.204514 L 76.889046,88.5978 h -18.02164 l -4.34586,9.121815 z M 60.356547,84.681874 H 75.339124 L 67.863031,68.580495 Z M 90.746442,97.719615 V 64.411182 h 5.622266 v 33.308433 z m 15.815008,0 V 64.411182 h 17.01875 q 4.74093,0 7.93195,1.105674 3.19101,1.08264 4.77133,3.132744 1.58031,2.027068 1.58031,4.860358 0,2.718116 -1.27641,4.514836 -1.24601,1.79672 -3.19102,2.902395 -1.94499,1.082638 -4.04195,1.681545 l 8.63094,15.110881 h -5.95656 l -8.02313,-14.350729 h -11.82195 v 14.350729 z m 5.62226,-17.875066 h 9.57305 q 4.95367,0 7.65844,-1.520302 2.70476,-1.543336 2.70476,-4.560905 0,-2.948465 -2.43125,-4.399662 -2.40086,-1.474232 -6.59477,-1.474232 h -10.91023 z m 30.82793,17.875066 15.8943,-33.308433 h 6.35164 l 15.

