<svg width="91mm" height="61mm" viewBox="0 0 91 61" xmlns="http://www.w3.org/2000/svg">
  <style>
    text {
      font-family: -apple-system, system-ui, "Public Sans", sans-serif;
    }
  </style>

  <!-- Full-bleed background -->
  <rect width="91" height="61" fill="#2B4E5A"/>

  <!-- ========================= -->
  <!-- Fade Definitions          -->
  <!-- ========================= -->
  <defs>

    <!-- Regular grid fade (optimized for print) -->
    <linearGradient id="gridCombinedFade" x1="0" y1="0" x2="91" y2="61" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.015"/>
      <stop offset="20%"  stop-color="#FFFFFF" stop-opacity="0.045"/>
      <stop offset="50%"  stop-color="#FFFFFF" stop-opacity="0.045"/>
      <stop offset="80%"  stop-color="#FFFFFF" stop-opacity="0.045"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.015"/>
    </linearGradient>

    <!-- Center line fade (optimized for print) -->
    <linearGradient id="centerCombinedFade" x1="0" y1="0" x2="91" y2="61" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="20%"  stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="50%"  stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="80%"  stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>

  </defs>

  <!-- ========================= -->
  <!-- Grid Lines (extend bleed) -->
  <!-- ========================= -->

  <!-- Safe area starts at x=3, y=3 -->
  <!-- Original grid x positions: 10,20,30,40,50,60,70 -->
  <!-- Shifted by +3 mm: 13,23,33,43,53,63,73 -->

  <g stroke-width="0.25">
    <line x1="13" y1="0" x2="13" y2="61" stroke="url(#gridCombinedFade)"/>
    <line x1="23" y1="0" x2="23" y2="61" stroke="url(#gridCombinedFade)"/>
    <line x1="33" y1="0" x2="33" y2="61" stroke="url(#gridCombinedFade)"/>
    <line x1="43" y1="0" x2="43" y2="61" stroke="url(#centerCombinedFade)"/> <!-- center -->
    <line x1="53" y1="0" x2="53" y2="61" stroke="url(#gridCombinedFade)"/>
    <line x1="63" y1="0" x2="63" y2="61" stroke="url(#gridCombinedFade)"/>
    <line x1="73" y1="0" x2="73" y2="61" stroke="url(#gridCombinedFade)"/>
  </g>

  <!-- ========================= -->
  <!-- Quiet Zones               -->
  <!-- ========================= -->

  <!-- Wordmark quiet zone (capsule, 4mm radius, +10% vertical padding) -->
  <!-- Original: x=21,y=16.4 → shifted by +3 mm -->
  <rect x="24" y="19.4" width="35" height="13.2" rx="4" ry="4" fill="#2B4E5A"/>

  <!-- Upper tagline quiet zone -->
  <rect x="3" y="39.33" width="80" height="5.50" fill="#2B4E5A"/>

  <!-- Lower tagline quiet zone -->
  <rect x="17.77" y="43.93" width="50.47" height="5.50" fill="#2B4E5A"/>

  <!-- ========================= -->
  <!-- Wordmark + Taglines       -->
  <!-- ========================= -->

  <!-- Shift entire original design by +3 mm -->
  <g transform="translate(3,3)">
    <path fill="#FFFFFF"
          transform="translate(40,23) scale(0.188) translate(-85,-80)"
          d="M 26.957886,97.719615 11.306715,64.411182 h 5.561484 L 30.331245,92.882294 43.794292,64.411182 h 5.561484 L 33.734995,97.719615 Z m 21.850224,0 15.894295,-33.308433 h 6.351641 L 86.948342,97.719615 H 81.204514 L 76.889046,88.5978 h -18.02164 l -4.34586,9.121815 z M 60.356547,84.681874 H 75.339124 L 67.863031,68.580495 Z M 90.746442,97.719615 V 64.411182 h 5.622266 v 33.308433 z m 15.815008,0 V 64.411182 h 17.01875 q 4.74093,0 7.93195,1.105674 3.19101,1.08264 4.77133,3.132744 1.58031,2.027068 1.58031,4.860358 0,2.718116 -1.27641,4.514836 -1.24601,1.79672 -3.19102,2.902395 -1.94499,1.082638 -4.04195,1.681545 l 8.63094,15.110881 h -5.95656 l -8.02313,-14.350729 h -11.82195 v 14.350729 z m 5.62226,-17.875066 h 9.57305 q 4.95367,0 7.65844,-1.520302 2.70476,-1.543336 2.70476,-4.560905 0,-2.948465 -2.43125,-4.399662 -2.40086,-1.474232 -6.59477,-1.474232 h -10.91023 z m 30.82793,17.875066 15.8943,-33.308433 h 6.35164 l 15.8943,33.308433 h -5.74383 L 171.09258,88.5978 h -18.02164 l -4.34586,9.121815 z m 11.54844,-13.037741 h 14.98258 l -7.4761,-16.101379 z"
    />

    <text x="40" y="40.4" font-size="3.6" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.3">
      Technology from Early Concept
    </text>
    <text x="40" y="45.0" font-size="3.6" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.3">
      to Industrial Scale
    </text>
  </g>

</svg>
