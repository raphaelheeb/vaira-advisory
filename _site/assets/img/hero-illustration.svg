<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 600 600"
     role="img"
     aria-label="Technical contour illustration">

  <defs>
    <linearGradient id="cadStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B8D4D0" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#B8D4D0" stop-opacity="0.3"/>
    </linearGradient>

    <style>
      .c { fill: none; stroke: url(#cadStroke); stroke-width: 1.5; vector-effect: non-scaling-stroke; }
      .dash { stroke-dasharray: 6 8; }
    </style>
  </defs>

     <g opacity="0.2">
